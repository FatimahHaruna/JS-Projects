    <script>
//11a
        const num = [10,20,30];

//11b
        function getLastValue(array) {
            const lastvalue = array.length - 1;
            return array[lastvalue];
        }
        console.log(getLastValue([1,20,22,24,5]));
        console.log(getLastValue(['hi', 'hello', 'good']));
//11c
        function arraySwap(array) {
            const lastindex = array.length - 1;

            const firstvalue = array[0];
            const lastvalue = array[lastindex];

            array[0] = lastvalue;
            array[lastindex] = firstvalue;
            return array;
        }
        console.log(arraySwap([1,20,22,24,5]));
        console.log(arraySwap(['hi','hello','good']));
//11d
        for(let i=0; i <= 10; i +=2) {

//11e

            console.log(i);

//11f

            console.log(i);
            i+=2;
        }

//11h
       function addOne(array) {
        let result = [];
        for(let i=0; i<array.length; i++) {
            result.push(array[i] + 1);
        }
        return result;
       }
        console.log(addOne([1,2,3]));
        console.log(addOne([-2,-1,0,99]));
//11i
        function addNum(array,num = 2) {
            newNum = [];
            for(let i=0; i< array.length; i++) {
                let result = array[i] + num;
                newNum.push(result);
            }
            return newNum;
        }
        console.log(addNum([1,2,3]));
        console.log(addNum([1,2,3],3));
        console.log(addNum([-2,-1,0,99]));
//11j
        function addArrays(array1,array2) {
            let array = [];
            for(let i=0; i<array1.length;i++){
                let result = array1[i] + array2[i];
                array.push(result);
            };
            return array;
        }
        console.log(addArrays([1,1,2],[1,1,3]));
        console.log(addArrays([1,2,3],[4,5,6]));
//11k
        function countPositive(nums) {
            let array = 0;
            for(let i=0; i< nums.length; i++) {
                if(nums[i] > 0) {
                    array++;
                }
            }
            return array;
        }
        console.log(countPositive([1,-3,5]));
        console.log(countPositive([-2,3,-5,7,10]));
//11l
        function minMax(nums) {
            const result = {min:num[0], max:num[0]};
            for(let i=0; i<result.length; i++) {
                const value = nums[i];
                if(value < result.min) {
                    result.min = value;
                }
                if(value > result.max) {
                    result.max = value;
                }
            }
            return result;
        }
        console.log(minMax([1,-3,5]));
        console.log(minMax([-2,3,-5,7,10]));
//11m - Update 11l to handle null list and a list with a single item
        function minMax(nums){
            const result = {min:null, max:null};
            for(let i=0; i<nums.length;i++){
                const value = nums[i];
                if(result.min === null || value < result.min) {
                    result.min = value;
                };
                if(result.max === null || value > result.max) {
                    result.max = value;
                };
            }
            return result;
        }
        console.log(minMax([]));
        console.log(minMax([3]));
//11n
        function countWords(words) {
            const result = {};

            for(let i=0; i<words.length; i++) {
                const word = words[i];

                if(!result[word]) {
                    result[word] = 1;
                } else {
                    result[word]++;
                }
            }
            return result;
        }
        console.log(countWords(['apple', 'grape', 'apple', 'apple']));

//11p

        let arrayindex = -1;
        for(let i=0; i<array.length; i++) {
            if(array[i] === 'search') {

            }
        }
        console.log(arrayindex);
//11q
        function findIndex(array, word) {
            let wordindex = -1;
            for(let i=0; i<array.length; i++) {
                if(array[i] === word) {
                    wordindex = i;
                    break;
                }
            }
            return wordindex;
        }
        console.log(findIndex(['green', 'red', 'blue', 'red'],'red'));
        console.log(findIndex(['green', 'red', 'blue', 'red'], 'yellow'));
//11r
        function removeEgg(foods) {
            const foodcopy = foods.slice();
            const reversedfoods = foodcopy.reverse();
            const result = [];
            let eggsRemoved = 0;
            for(let i=0; i<reversedfoods.length; i++) {
                if(reversedfoods[i] === 'egg' && eggsRemoved < 2 ) {
                    eggsRemoved++;
                    continue;
                }
                result.push(reversedfoods[i]);
            }
            return result.reverse();
        }
        console.log(removeEgg(['egg', 'apple','egg', 'egg', 'ham']));
//11s - update 11r to remove only the first 2 eggs from array.
