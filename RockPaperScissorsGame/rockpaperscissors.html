<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="rockpaperscissors.css">
</head>
<body>
    <div class="box">
        <h4>Rock Paper Scissors</h4><br>
        <div class="button-row">
            <button onclick="myFunction('Rock')">
                <img src="/images/rock-emoji.png" alt="Rock">
            </button>
            <button onclick="myFunction('Paper')">
                <img src="/images/paper-emoji.png " alt="Paper">
            </button>
            <button onclick="myFunction('Scissors')">
                <img src="/images/scissors-emoji.png" alt="Scissors">
            </button>
        </div>
        <p id="status"></p>
        <p id="scoreboard"></p>
        <button class="reset-button" onclick="resetScore()">Reset</button>
        <button class="autoplay-button" onclick="autoplay()">Autoplay</button>
    </div>
    
    <script src="rockpaperscissors.js"></script>
</body>
</html>
